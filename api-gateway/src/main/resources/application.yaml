spring:
  application:
    name: api-gateway
  app:
    jwtSecret: mySecretKey123912738fsdfsdfsdfsdfsdfsdfsdfsdfsdfsdfsdfsdfsdfsdfgfdhrher
    jwtExpirationMs: 3000000
  ecom:
    app:
      jwtCookieName: springBootEcom

  cloud:
    gateway:
      routes:
        - id: product-manager
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/product-manager/**
          filters:
            - RewritePath=/product-manager/(?<segment>.*), /$\{segment}
        - id: user-manager
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-manager/**
          filters:
            - RewritePath=/user-manager/(?<segment>.*), /$\{segment}
        - id: order-manager
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/order-manager/**
          filters:
            - RewritePath=/order-manager/(?<segment>.*), /$\{segment}
        - id: eureka-server
          uri: ${EUREKA_SERVER_URL:http://localhost:8761}
          predicates:
            - Path=/eureka/main
          filters:
            - SetPath=/
        - id: eureka-server-static
          uri: ${EUREKA_SERVER_URL:http://localhost:8761}
          predicates:
            - Path=/eureka/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

gateway:
  security:
    public-paths:
      - /user-manager/api/auth/**
      - /user-manager/api/public/**
      - /product-manager/api/public/**
      - /product-manager/images/**
      - /order-manager/api/public/**
      - /order-manager/api/internal/**
      - /eureka/**
      - /v3/api-docs/**
      - /swagger-ui/**

    role-mappings:
      - pattern: /product-manager/api/admin/**
        roles: [ ROLE_ADMIN ]
      - pattern: /user-manager/api/admin/**
        roles: [ ROLE_ADMIN ]
      - pattern: /order-manager/api/admin/**
        roles: [ ROLE_ADMIN ]
      - pattern: /order-manager/api/seller/**
        roles: [ ROLE_ADMIN, ROLE_SELLER ]

server:
  port: 8080

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true